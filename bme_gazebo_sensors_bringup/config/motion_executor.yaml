motion_executor:
  ros__parameters:
    action_name: execute_target_pose
    cmd_vel_topic: /cmd_vel
    odom_topic: /odom
    execution_frame: odom
    control_rate_hz: 20.0
    max_linear_velocity: 0.4
    max_angular_velocity: 1.0
    goal_position_tolerance: 0.05
    goal_yaw_tolerance: 0.05
    linear_kp: 0.8
    angular_kp: 1.5
    heading_alignment_threshold_rad: 1.0
    odom_wait_timeout_sec: 2.0
    max_execution_time_sec: 120.0